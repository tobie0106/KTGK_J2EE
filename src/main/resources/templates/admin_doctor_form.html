<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Doctor Form</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }
        .form-card {
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .preview-img {
            width: 100%;
            max-height: 200px;
            object-fit: cover;
            border-radius: 10px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <h2 class="text-center mb-4"
        th:text="${doctor.id == null}? '➕ Tạo bác sĩ' : '✏️ Chỉnh sửa bác sĩ'">
    </h2>

    <div class="card form-card p-4 col-md-6 mx-auto">

        <form th:action="${doctor.id == null} ? @{/admin/doctors/create} : @{/admin/doctors/edit/{id}(id=${doctor.id})}"
              method="post"
              th:object="${doctor}"
              enctype="multipart/form-data">

            <!-- NAME -->
            <div class="mb-3">
                <label class="form-label">Tên bác sĩ</label>
                <input type="text" class="form-control" th:field="*{name}" required>
            </div>

            <!-- SPECIALTY -->
            <div class="mb-3">
                <label class="form-label">Chuyên khoa</label>
                <input type="text" class="form-control" th:field="*{specialty}" required>
            </div>

            <!-- IMAGE FILE -->
            <div class="mb-3" th:with="img=*{image}, imgUrl=${img != null and img != '' ? (img.startsWith('http') ? img : '/images/' + img) : 'https://via.placeholder.com/400x200?text=No+Image'}">
                <label class="form-label">Ảnh bác sĩ</label>
                <input type="file" class="form-control" name="imageFile" id="imageFile" accept="image/*">

                <img id="preview" class="preview-img"
                     th:src="${imgUrl}"
                     onerror="this.src='https://via.placeholder.com/400x200?text=No+Image'"/>
            </div>

            <!-- DEPARTMENT -->
            <div class="mb-3">
                <label class="form-label">Khoa</label>
                <select class="form-select" th:field="*{department.id}">
                    <option value="">-- Chọn khoa --</option>
                    <option th:each="dep : ${departments}"
                            th:value="${dep.id}"
                            th:text="${dep.name}">
                    </option>
                </select>
            </div>

            <!-- BUTTON -->
            <div class="d-flex justify-content-between">
                <a th:href="@{/admin/doctors}" class="btn btn-secondary">⬅ Quay lại</a>
                <button type="submit" class="btn btn-success">💾 Lưu</button>
            </div>

        </form>
    </div>
</div>

<script>
    const fileInput = document.getElementById("imageFile");
    const preview = document.getElementById("preview");

    fileInput.addEventListener("change", function () {
        const file = this.files[0];
        if (file) {
            preview.src = URL.createObjectURL(file);
        }
    });
</script>

</body>
</html>

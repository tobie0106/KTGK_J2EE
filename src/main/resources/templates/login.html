<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Login</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            height: 100vh;
        }

        .login-card {
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        }

        .form-control {
            border-radius: 10px;
        }

        .btn {
            border-radius: 10px;
        }

        .google-btn {
            background: white;
            border: 1px solid #ddd;
        }

        .google-btn:hover {
            background: #f5f5f5;
        }
    </style>
</head>

<body class="d-flex justify-content-center align-items-center">

<div class="card login-card p-4" style="width: 380px;">

    <!-- TITLE -->
    <div class="text-center mb-3">
        <h3>🔐 Welcome Back</h3>
        <p class="text-muted">Đăng nhập vào hệ thống Clinic</p>
    </div>

    <!-- ERROR -->
    <div th:if="${param.error}" class="alert alert-danger">
        Sai username hoặc password!
    </div>

    <!-- FORM -->
    <form th:action="@{/login}" method="post">

        <div class="mb-3">
            <label class="form-label">Username</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-person"></i></span>
                <input type="text" name="username" class="form-control" placeholder="Nhập username" required>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input type="password" name="password" class="form-control" placeholder="Nhập password" required>
            </div>
        </div>

        <button class="btn btn-primary w-100 mb-3">Login</button>
    </form>

    <!-- GOOGLE LOGIN -->
    <a th:href="@{/oauth2/authorization/google}" class="btn google-btn w-100 mb-3">
        <i class="bi bi-google"></i> Đăng nhập bằng Google
    </a>

    <!-- REGISTER -->
    <div class="text-center">
        <span>Chưa có tài khoản?</span>
        <a th:href="@{/register}">Đăng ký</a>
    </div>

</div>

</body>
</html>

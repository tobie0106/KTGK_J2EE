<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Register</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #43e97b, #38f9d7);
            height: 100vh;
        }

        .register-card {
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            animation: fadeIn 0.6s ease-in-out;
        }

        .form-control {
            border-radius: 10px;
        }

        .btn {
            border-radius: 10px;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(20px);}
            to {opacity: 1; transform: translateY(0);}
        }
    </style>
</head>

<body class="d-flex justify-content-center align-items-center">

<div class="card register-card p-4" style="width: 400px;">

    <!-- TITLE -->
    <div class="text-center mb-3">
        <h3>📝 Create Account</h3>
        <p class="text-muted">Đăng ký tài khoản bệnh nhân</p>
    </div>

    <!-- ERROR -->
    <div th:if="${error}" class="alert alert-danger">
        <span th:text="${error}"></span>
    </div>

    <!-- FORM -->
    <form th:action="@{/register}" method="post" th:object="${patient}">

        <!-- USERNAME -->
        <div class="mb-3">
            <label class="form-label">Username</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-person"></i></span>
                <input type="text" th:field="*{username}" class="form-control" placeholder="Nhập username" required>
            </div>
        </div>

        <!-- PASSWORD -->
        <div class="mb-3">
            <label class="form-label">Password</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input type="password" th:field="*{password}" class="form-control" placeholder="Nhập password" required>
            </div>
        </div>

        <!-- EMAIL -->
        <div class="mb-3">
            <label class="form-label">Email</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                <input type="email" th:field="*{email}" class="form-control" placeholder="Nhập email" required>
            </div>
        </div>

        <button class="btn btn-success w-100 mb-3">Đăng ký</button>
    </form>

    <!-- LOGIN LINK -->
    <div class="text-center">
        <span>Đã có tài khoản?</span>
        <a th:href="@{/login}">Đăng nhập</a>
    </div>

</div>

</body>
</html>

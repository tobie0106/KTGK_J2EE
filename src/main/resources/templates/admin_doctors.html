<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Admin - Doctors</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }

        .table-container {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>👨‍⚕️ Quản lý bác sĩ</h2>
        <a th:href="@{/admin/doctors/create}" class="btn btn-success">
            ➕ Thêm bác sĩ
        </a>
    </div>

    <!-- NAV -->
    <div class="mb-3">
        <a th:href="@{/home}" class="btn btn-outline-primary">🏠 Home</a>
    </div>

    <!-- TABLE -->
    <div class="table-container">
        <table class="table table-hover align-middle text-center">

            <thead class="table-dark">
            <tr>
                <th>#</th>
                <th>Tên</th>
                <th>Chuyên khoa</th>
                <th>Khoa</th>
                <th>Hành động</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="doctor,iterStat : ${doctors}">
                <td th:text="${iterStat.index + 1}"></td>
                <td th:text="${doctor.name}"></td>
                <td th:text="${doctor.specialty}"></td>
                <td th:text="${doctor.department != null ? doctor.department.name : 'N/A'}"></td>

                <td>
                    <!-- EDIT -->
                    <a th:href="@{'/admin/doctors/edit/' + ${doctor.id}}"
                       class="btn btn-warning btn-sm">
                        <i class="bi bi-pencil-square"></i> Edit
                    </a>

                    <!-- DELETE -->
                    <a th:href="@{'/admin/doctors/delete/' + ${doctor.id}}"
                       class="btn btn-danger btn-sm"
                       onclick="return confirm('Bạn có chắc muốn xóa bác sĩ này?');">
                        <i class="bi bi-trash"></i> Delete
                    </a>
                </td>
            </tr>
            </tbody>

        </table>
    </div>

</div>

</body>
</html>

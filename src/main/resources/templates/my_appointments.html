<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>My Appointments</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">

    <style>
        body {
            background: #f5f7fa;
        }

        .table-container {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="#">🏥 Clinic</a>

        <div class="ms-auto">
            <a th:href="@{/home}" class="btn btn-light me-2">Home</a>
            <a th:href="@{/logout}" class="btn btn-warning">Logout</a>
        </div>
    </div>
</nav>

<!-- CONTENT -->
<div class="container mt-5">

    <h2 class="text-center mb-4">📅 Lịch khám của tôi</h2>

    <div class="table-container">

        <!-- EMPTY STATE -->
        <div th:if="${#lists.isEmpty(appointments)}" class="text-center text-muted">
            <h5>😢 Bạn chưa có lịch khám nào</h5>
            <a th:href="@{/home}" class="btn btn-primary mt-3">Đặt lịch ngay</a>
        </div>

        <!-- TABLE -->
        <table class="table table-hover text-center align-middle"
               th:if="${!#lists.isEmpty(appointments)}">

            <thead class="table-dark">
            <tr>
                <th>#</th>
                <th>Bác sĩ</th>
                <th>Ngày khám</th>
                <th>Khoa</th>
                <th>Trạng thái</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="app, iterStat : ${appointments}">
                <td th:text="${iterStat.index + 1}"></td>

                <td th:text="${app.doctor.name}"></td>

                <td>
                    <span class="badge bg-info text-dark"
                          th:text="${app.appointmentDate}">
                    </span>
                </td>

                <td th:text="${app.doctor.department.name}"></td>

                <td>
                    <span class="badge bg-success">Đã đặt</span>
                </td>
            </tr>
            </tbody>

        </table>

    </div>

</div>

</body>
</html>
